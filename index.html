<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dashboard de Asistencia Escolar — Herramienta interactiva para gestionar y visualizar la asistencia de alumnos conectada a Google Sheets.">
  <meta name="theme-color" content="#0b1120">
  <title>Dashboard de Asistencia Escolar</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS v3 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
          },
          colors: {
            brand: {
              900: '#0b1120',
              800: '#101829',
              700: '#1e293b',
              600: '#1e3a5f',
              500: '#3b82f6',
              400: '#60a5fa',
              300: '#93c5fd',
            }
          },
          animation: {
            'fade-up': 'fadeUp 0.5s cubic-bezier(0.4,0,0.2,1) forwards',
          },
          keyframes: {
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <!-- Chart.js v4 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-brand-900 text-slate-200 font-sans antialiased">

  <!-- ===== Sidebar Overlay (mobile) ===== -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <!-- ===== Sidebar Navigation ===== -->
  <aside id="sidebar" class="sidebar flex flex-col">
    <!-- Logo / Brand -->
    <div class="px-5 pt-6 pb-4 flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-500 to-cyan-400 flex items-center justify-center text-white text-lg font-bold shadow-lg shadow-blue-500/20">
        A
      </div>
      <div>
        <h1 class="text-sm font-bold text-white tracking-tight">Asistencia</h1>
        <p class="text-[0.65rem] text-slate-500 font-medium">Dashboard Escolar</p>
      </div>
    </div>

    <!-- Divider -->
    <div class="mx-4 border-t border-white/5 mb-3"></div>

    <!-- Navigation Links -->
    <nav class="flex-1 px-3 space-y-0.5">
      <p class="px-3 pt-2 pb-1.5 text-[0.65rem] font-semibold text-slate-600 uppercase tracking-wider">Principal</p>

      <a href="#" class="nav-link active" data-view="dashboard" id="nav-dashboard">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" width="20" height="20">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
          </svg>
        </span>
        <span>Dashboard</span>
      </a>

      <a href="#" class="nav-link" data-view="form" id="nav-form">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" width="20" height="20">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25z" />
          </svg>
        </span>
        <span>Formulario</span>
      </a>

      <p class="px-3 pt-5 pb-1.5 text-[0.65rem] font-semibold text-slate-600 uppercase tracking-wider">Otros</p>

      <a href="#" class="nav-link disabled" data-view="reports" id="nav-reports">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" width="20" height="20">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 013 19.875v-6.75zM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V8.625zM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 01-1.125-1.125V4.125z" />
          </svg>
        </span>
        <span>Reportes</span>
        <span class="ml-auto text-[0.6rem] bg-white/5 text-slate-500 px-2 py-0.5 rounded-full">Pronto</span>
      </a>

      <a href="#" class="nav-link disabled" data-view="students" id="nav-students">
        <span class="nav-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor" width="20" height="20">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z" />
          </svg>
        </span>
        <span>Alumnos</span>
        <span class="ml-auto text-[0.6rem] bg-white/5 text-slate-500 px-2 py-0.5 rounded-full">Pronto</span>
      </a>
    </nav>

    <!-- Sidebar Footer -->
    <div class="px-4 py-4 border-t border-white/5">
      <div class="flex items-center gap-3 px-2">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-violet-500 to-fuchsia-500 flex items-center justify-center text-white text-xs font-bold">
          AD
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-xs font-semibold text-slate-300 truncate">Administrador</p>
          <p class="text-[0.6rem] text-slate-500">Panel de Control</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- ===== Main Content Area ===== -->
  <main class="main-content min-h-screen flex flex-col">

    <!-- ===== Top Bar ===== -->
    <header class="topbar flex items-center justify-between px-6 gap-4">
      <!-- Left: Menu toggle + View title -->
      <div class="flex items-center gap-3">
        <button id="menu-toggle" class="menu-toggle" aria-label="Abrir menú">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="20" height="20">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
          </svg>
        </button>
        <h2 id="view-title" class="text-base font-semibold text-white">Dashboard General</h2>
      </div>

      <!-- Right: Month selector + Status -->
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-2">
          <label for="month-select" class="text-xs font-medium text-slate-400 hidden sm:inline">Mes:</label>
          <select id="month-select" class="select-modern">
            <!-- Populated by JS -->
          </select>
        </div>

        <!-- Connection indicator -->
        <div id="connection-indicator" class="flex items-center gap-1.5" title="Estado de conexión">
          <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
          <span class="text-[0.65rem] text-slate-500 hidden md:inline">Conectado</span>
        </div>
      </div>
    </header>

    <!-- ===== Content Area ===== -->
    <div id="view-content" class="flex-1 p-6">
      <!-- Dynamic content rendered by modules -->
    </div>

  </main>

  <!-- ===== Loading Overlay ===== -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="spinner"></div>
    <p class="text-sm text-slate-400 font-medium">Cargando datos...</p>
  </div>

  <!-- ===== Toast Container ===== -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ===== Scripts (order matters) ===== -->
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/form.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
